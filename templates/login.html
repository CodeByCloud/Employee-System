{% extends "base.html" %}
{% set hide_logout = true %}
{% block content %}

<h2 data-i18n="login_title" style="margin-bottom:20px;">Login</h2>

{% if error %}
<div
       style="background:#7f1d1d; color:#fca5a5; padding:10px 14px; border-radius:8px; margin-bottom:14px; font-size:13px;">
       {{ error }}
</div>
{% endif %}

<form method="POST" style="display:flex; flex-direction:column; gap:12px;">

       <input type="text" name="username" data-i18n-placeholder="login_username" placeholder="Username" required
              style="padding:10px; border-radius:8px; border:1px solid #4b5563; background:#020617; color:white; outline:none; font-size:14px;">

       <input type="password" name="password" data-i18n-placeholder="login_password" placeholder="Password" required
              style="padding:10px; border-radius:8px; border:1px solid #4b5563; background:#020617; color:white; outline:none; font-size:14px;">

       <button type="submit" data-i18n="login_button"
              style="margin-top:8px; width:100%; padding:11px; border-radius:999px; border:none; background:#3b82f6; color:white; font-weight:600; cursor:pointer; font-size:14px; transition:background 0.2s;">
              Login
       </button>

</form>

<a href="/signup" data-i18n="login_create"
       style="display:block; margin-top:14px; font-size:13px; text-align:center; opacity:0.75; text-decoration:none; color:inherit;">
       Create an account
</a>

{% endblock %}
